apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.appName }}-frontend"
  namespace: '{{ .Values.namespace | default "carbonxchange" }}'
  labels:
    app: "{{ .Values.appName }}-frontend"
    component: frontend
    tier: presentation
    version: "{{ .Values.frontend.image.tag }}"
    environment: "{{ .Values.environment }}"
spec:
  replicas: { { .Values.frontend.replicas } }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-frontend"
      component: frontend
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-frontend"
        component: frontend
        tier: presentation
        version: "{{ .Values.frontend.image.tag }}"
        environment: "{{ .Values.environment }}"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: "{{ .Values.appName }}-frontend-sa"
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - "{{ .Values.appName }}-frontend"
                topologyKey: kubernetes.io/hostname
      containers:
        - name: "{{ .Values.appName }}-frontend"
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: "{{ .Values.frontend.image.pullPolicy }}"
          ports:
            - name: http
              containerPort: { { .Values.frontend.containerPort } }
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            limits:
              cpu: "{{ .Values.frontend.resources.limits.cpu }}"
              memory: "{{ .Values.frontend.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.frontend.resources.requests.cpu }}"
              memory: "{{ .Values.frontend.resources.requests.memory }}"
          env:
            - name: REACT_APP_API_URL
              value: "{{ .Values.frontend.apiUrl }}"
            - name: REACT_APP_ENV
              value: "{{ .Values.environment }}"
          livenessProbe:
            httpGet:
              path: /
              port: { { .Values.frontend.containerPort } }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: { { .Values.frontend.containerPort } }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: "{{ .Values.imagePullSecret }}"
