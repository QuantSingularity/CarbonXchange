apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.appName }}-backend"
  namespace: '{{ .Values.namespace | default "carbonxchange" }}'
  labels:
    app: "{{ .Values.appName }}-backend"
    component: backend
    environment: "{{ .Values.environment }}"
spec:
  type: ClusterIP
  ports:
    - port: { { .Values.backend.servicePort } }
      targetPort: { { .Values.backend.containerPort } }
      protocol: TCP
      name: http
    - port: { { .Values.backend.metrics.port | default 9090 } }
      targetPort: { { .Values.backend.metrics.port | default 9090 } }
      protocol: TCP
      name: metrics
    - port: { { .Values.backend.health.port | default 8080 } }
      targetPort: { { .Values.backend.health.port | default 8080 } }
      protocol: TCP
      name: health
  selector:
    app: "{{ .Values.appName }}-backend"
    component: backend
