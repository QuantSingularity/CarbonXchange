apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carbonxchange-backend-netpol
  namespace: carbonxchange
  labels:
    app.kubernetes.io/name: carbonxchange
    app.kubernetes.io/component: security
    tier: backend
    compliance.carbonxchange.io/pci-dss: "true"
    compliance.carbonxchange.io/sox: "true"
  annotations:
    compliance.carbonxchange.io/description: "Network policy for backend services - restricts traffic to authorized sources only"
    security.carbonxchange.io/policy-type: "micro-segmentation"
spec:
  podSelector:
    matchLabels:
      component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: frontend
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              component: monitoring
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
    - from:
        - podSelector:
            matchLabels:
              component: api-gateway
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              component: database
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to:
        - podSelector:
            matchLabels:
              component: monitoring
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 3000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carbonxchange-frontend-netpol
  namespace: carbonxchange
  labels:
    app.kubernetes.io/name: carbonxchange
    app.kubernetes.io/component: security
    tier: frontend
    compliance.carbonxchange.io/pci-dss: "true"
spec:
  podSelector:
    matchLabels:
      component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    - from:
        - podSelector:
            matchLabels:
              component: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              component: backend
      ports:
        - protocol: TCP
          port: 3000
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carbonxchange-database-netpol
  namespace: carbonxchange
  labels:
    app.kubernetes.io/name: carbonxchange
    app.kubernetes.io/component: security
    tier: database
    compliance.carbonxchange.io/pci-dss: "true"
    compliance.carbonxchange.io/sox: "true"
    compliance.carbonxchange.io/gdpr: "true"
  annotations:
    compliance.carbonxchange.io/description: "Highly restrictive network policy for database - only allows authorized application access"
    security.carbonxchange.io/criticality: "high"
spec:
  podSelector:
    matchLabels:
      component: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: backend
      ports:
        - protocol: TCP
          port: 3306
    - from:
        - podSelector:
            matchLabels:
              component: monitoring
      ports:
        - protocol: TCP
          port: 3306
    - from:
        - podSelector:
            matchLabels:
              component: backup
      ports:
        - protocol: TCP
          port: 3306
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              component: database
              role: replica
      ports:
        - protocol: TCP
          port: 3306

