appName: carbonxchange
namespace: carbonxchange
environment: staging

aws:
  region: us-west-2
  kmsKeyId: ""
  s3Bucket: "carbonxchange-staging-assets"
  cloudwatchLogGroup: "/carbonxchange/staging"

backend:
  replicas: 3
  image:
    repository: registry.example.com/app/backend
    tag: stable
    pullPolicy: Always
  containerPort: 3000
  servicePort: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  apiUrl: http://carbonxchange-backend
  jwtSecret: staging-jwt-secret-change-in-vault
  apiKey: staging-api-key-change-in-vault
  encryptionKey: staging-encryption-key-32-chars!!!
  apiKeySalt: staging-api-key-salt-change-in-vault
  corsOrigins: "https://staging.carbonxchange.example.com"
  logLevel: info
  metrics:
    port: 9090
    path: /metrics
  health:
    port: 8080
    livenessPath: /health/live
    readinessPath: /health/ready
    startupPath: /health/startup
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    startupProbe:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 1
      failureThreshold: 60
  strategy:
    maxSurge: "25%"
    maxUnavailable: "25%"
  rateLimit:
    windowMs: "900000"
    maxRequests: "100"
  session:
    timeoutMinutes: "30"
  security:
    maxLoginAttempts: "5"
    lockoutDurationMinutes: "15"
    passwordMinLength: "12"
    requireMFA: "true"
    enableTransactionSigning: "true"
  compliance:
    dataRetentionDays: "2555"
    auditLogRetentionDays: "2555"
    enableGDPR: "true"
    enablePCIDSS: "true"
    enableSOX: "true"
  initContainer:
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

database:
  replicas: 1
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: carbonxchangedb
  user: appuser
  password: staging-db-password-change-in-vault
  rootPassword: staging-root-password-change-in-vault
  url: "mysql://appuser:staging-db-password-change-in-vault@carbonxchange-database:3306/carbonxchangedb"
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

redis:
  replicas: 2
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  password: staging-redis-password-change-in-vault
  url: "redis://:staging-redis-password-change-in-vault@carbonxchange-redis:6379"
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

ingress:
  host: staging.carbonxchange.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

backup:
  schedule: "0 2 * * *"

logLevel: info
imagePullSecret: regcred
