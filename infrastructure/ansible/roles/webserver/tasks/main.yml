---
# roles/webserver/tasks/main.yml
- name: Install web server packages
  ansible.builtin.dnf:
    name:
      - nginx
      - nodejs
      - npm
    state: present
  tags:
    - packages

- name: Create web application directory
  ansible.builtin.file:
    path: /var/www/{{ webserver_app_name }}
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"
  tags:
    - filesystem

- name: Configure Nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/{{ webserver_app_name }}.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c /etc/nginx/nginx.conf
  notify: Restart Nginx
  tags:
    - configuration

- name: Ensure nginx.conf includes conf.d
  ansible.builtin.lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: "include /etc/nginx/conf.d"
    line: "    include /etc/nginx/conf.d/*.conf;"
    state: present
  notify: Restart Nginx
  tags:
    - configuration

- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  tags:
    - services

- name: Open Nginx ports in SELinux
  ansible.posix.seport:
    ports: "{{ item }}"
    proto: tcp
    setype: http_port_t
    state: present
  loop:
    - 80
    - 443
  when: ansible_os_family == "RedHat"
  tags:
    - selinux
    - security
