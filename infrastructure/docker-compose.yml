version: "3.9"

# CarbonXchange local development stack
# Usage:
#   docker compose up                  # start all services
#   docker compose up -d               # start detached
#   docker compose --profile tools up  # start with DB admin tools
#   docker compose down -v             # stop and remove volumes

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  # ──────────────────────────────────────────────────────────────
  # DATABASE
  # ──────────────────────────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: carbonxchange-database
    <<: *restart-policy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-carbonxchangedb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev-db-password}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-dev-root-password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────
  # REDIS
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: carbonxchange-redis
    <<: *restart-policy
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev-redis-password}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-dev-redis-password}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
      target: runtime
    image: carbonxchange-backend:dev
    container_name: carbonxchange-backend
    <<: *restart-policy
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3000"
      METRICS_PORT: "9090"
      HEALTH_PORT: "8080"
      DATABASE_URL: "mysql://${MYSQL_USER:-appuser}:${MYSQL_PASSWORD:-dev-db-password}@database:3306/${MYSQL_DATABASE:-carbonxchangedb}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-dev-redis-password}@redis:6379"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-long!!}
      API_KEY_SALT: ${API_KEY_SALT:-dev-api-key-salt}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CORS_ORIGINS: "http://localhost:3001,http://frontend:80"
      ENABLE_AUDIT_LOGGING: "true"
      ENABLE_SECURITY_HEADERS: "true"
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "1000"
      SESSION_TIMEOUT_MINUTES: "30"
      REQUIRE_MFA: "false"
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:8080:8080"
    volumes:
      - /tmp:/tmp
    networks:
      - backend-net
      - frontend-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
      target: runtime
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: development
    image: carbonxchange-frontend:dev
    container_name: carbonxchange-frontend
    <<: *restart-policy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - frontend-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY (dev gateway)
  # ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: carbonxchange-nginx
    <<: *restart-policy
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-net
      - backend-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────
  # OPTIONAL TOOLS (start with: docker compose --profile tools up)
  # ──────────────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: carbonxchange-adminer
    profiles: [tools]
    <<: *restart-policy
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "127.0.0.1:8888:8080"
    networks:
      - backend-net
    logging: *default-logging

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: carbonxchange-redis-commander
    profiles: [tools]
    <<: *restart-policy
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-dev-redis-password}"
    ports:
      - "127.0.0.1:8889:8081"
    networks:
      - backend-net
    logging: *default-logging

networks:
  backend-net:
    driver: bridge
    internal: false
  frontend-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
