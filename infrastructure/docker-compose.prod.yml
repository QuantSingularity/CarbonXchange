version: "3.9"

# Production overrides — usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  database:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G

  redis:
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  backend:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      REQUIRE_MFA: "true"
      RATE_LIMIT_MAX_REQUESTS: "100"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/carbonxchange/prod"
        awslogs-region: "us-west-2"
        awslogs-stream-prefix: "backend"

  frontend:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/carbonxchange/prod"
        awslogs-region: "us-west-2"
        awslogs-stream-prefix: "frontend"
